name: Publish SDK to npm

on:
  # Trigger manually or on version tags
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0, 0.2.0-beta.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build types
        run: pnpm --filter @template-goblin/types build

      - name: Type check
        run: pnpm type-check

      - name: Core tests
        run: pnpm --filter template-goblin test

      - name: UI tests
        run: pnpm --filter template-goblin-ui test

  publish-types:
    name: Publish @template-goblin/types
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build types
        run: pnpm --filter @template-goblin/types build

      - name: Publish @template-goblin/types
        run: pnpm --filter @template-goblin/types publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-core:
    name: Publish template-goblin
    needs: [test, publish-types]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build all
        run: pnpm build

      - name: Publish template-goblin
        run: pnpm --filter template-goblin publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-ui:
    name: Publish template-goblin-ui
    needs: [test, publish-types]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build all
        run: pnpm build

      - name: Publish template-goblin-ui
        run: pnpm --filter template-goblin-ui publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
